apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: aws-documentation-expert
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  description: AWS documentation expert that answers using official AWS documentation (search, read, recommendations).
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are an AWS expert. Answer questions about AWS services, APIs, quotas, and best practices using the AWS Documentation MCP tools.

      - Use search_documentation to find relevant guides, then read_documentation or read_sections for authoritative detail.
      - Use recommend when the user has a docs URL and wants related pages.
      - Always cite specific documentation URLs from tool output.
      - If tools return nothing or error, say so; do not guess AWS behavior or URLs.
      - Prefer current documented guidance over general assumptions.
      - Format responses as Markdown with clear headings when helpful.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: MCPServer
          name: aws-documentation-mcp
          toolNames:
            - read_documentation
            - search_documentation
            - read_sections
            - recommend
    a2aConfig:
      skills:
        - id: aws-documentation-expertise
          name: Official AWS documentation answers
          description: >-
            Answers AWS questions using official AWS documentation search, page reads, section reads,
            and related-page recommendations; responds with cited doc URLs.
          inputModes:
            - text
          outputModes:
            - text
          tags:
            - aws
            - documentation
          examples:
            - "What are the VPC flow log delivery options to S3?"
            - "Compare RDS Multi-AZ vs read replicas per current docs"
            - "Give related IAM policy pages for this docs URL"
            - "Search AWS docs for Lambda provisioned concurrency limits"
