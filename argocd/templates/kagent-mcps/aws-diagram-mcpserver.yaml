# AWS Diagram MCP Server
# Docs: https://pypi.org/project/awslabs.aws-diagram-mcp-server/
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: aws-diagram-mcp
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  timeout: 300s
  transportType: stdio
  stdioTransport: {}
  deployment:
    cmd: uvx
    args:
      - awslabs.aws-diagram-mcp-server@1.0.23
    port: 3000
    env:
      FASTMCP_LOG_LEVEL: ERROR
