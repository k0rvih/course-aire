apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-discovery
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/k0rvih/course-aire
    targetRevision: main
    path: argocd/templates/inventory-discovery
    directory:
      recurse: true
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: agentregistry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
