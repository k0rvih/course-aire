apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-security-governance
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: ghcr.io/techwithhuz/charts
    chart: mcp-governance
    targetRevision: 0.22.2
    helm:
      skipCrds: true
      parameters:
        - name: createNamespace
          value: "true"
        - name: controller.image.pullPolicy
          value: Always
        - name: dashboard.image.pullPolicy
          value: Always
        - name: dashboard.service.type
          value: LoadBalancer
        - name: dashboard.service.nodePort
          value: "null"
        - name: samples.install
          value: "true"
        - name: governancePolicy.spec.requireHardenedDeployment
          value: "true"
        - name: governancePolicy.spec.aiAgent.enabled
          value: "true"
        - name: governancePolicy.spec.aiAgent.provider
          value: ollama
        - name: governancePolicy.spec.aiAgent.model
          value: gemma4:26b
        - name: governancePolicy.spec.aiAgent.ollamaEndpoint
          value: http://ollama.agentgateway-system.svc.cluster.local:11434
        - name: governancePolicy.spec.aiAgent.scanInterval
          value: 10m
        - name: governancePolicy.spec.aiAgent.scanEnabled
          value: "true"
        - name: governancePolicy.spec.maxToolsCritical
          value: "30"
        - name: governancePolicy.spec.requireTLS
          value: "true"
        - name: governancePolicy.spec.requirePromptGuard
          value: "true"
        - name: governancePolicy.spec.requireJWTAuth
          value: "true"
        - name: governancePolicy.spec.scoringWeights.agentGatewayIntegration
          value: "25"
        - name: governancePolicy.spec.scoringWeights.authentication
          value: "20"
        - name: governancePolicy.spec.scoringWeights.authorization
          value: "15"
        - name: governancePolicy.spec.scoringWeights.corsPolicy
          value: "10"
        - name: governancePolicy.spec.scoringWeights.tlsEncryption
          value: "10"
        - name: governancePolicy.spec.scoringWeights.promptGuard
          value: "5"
        - name: governancePolicy.spec.scoringWeights.rateLimit
          value: "5"
        - name: governancePolicy.spec.scoringWeights.toolScope
          value: "10"
        - name: governancePolicy.spec.verifiedCatalogScoring.securityWeight
          value: "50"
        - name: governancePolicy.spec.verifiedCatalogScoring.trustWeight
          value: "30"
        - name: governancePolicy.spec.verifiedCatalogScoring.complianceWeight
          value: "20"
        - name: governancePolicy.spec.verifiedCatalogScoring.verifiedThreshold
          value: "70"
        - name: governancePolicy.spec.verifiedCatalogScoring.unverifiedThreshold
          value: "50"
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-governance
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
