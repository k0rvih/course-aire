apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-security-governance-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/techwithhuz/mcp-security-governance
    targetRevision: v0.22.2
    path: deploy/crds
    directory:
      recurse: true
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-governance
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
